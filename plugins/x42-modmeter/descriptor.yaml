plugin:
  name: modmeter
  version: master
  source:
    type: git
    url: https://github.com/x42/modmeter.lv2.git
  build:
    - make MOD=1 OPTIMIZATIONS="-ffast-math -fomit-frame-pointer -O3 -fno-finite-math-only"
  install:
    - make install PREFIX=${PREFIX_DIR} MOD=1
  bundles:
    - modmeter.lv2
  dependencies: []
