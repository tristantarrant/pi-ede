plugin:
  name: mod-cv-plugins
  version: master
  source:
    type: git
    url: https://github.com/moddevices/mod-cv-plugins.git
  build:
    - make
  install:
    - make install LV2_DESTDIR=${LV2_DIR}
  bundles:
    - logic-operators.lv2
    - mod-audio-to-cv.lv2
    - mod-button-to-cv.lv2
    - mod-cv-abs.lv2
    - mod-cv-attenuverter.lv2
    - mod-cv-clock.lv2
    - mod-cv-control.lv2
    - mod-cv-gate.lv2
    - mod-cv-meter.lv2
    - mod-cv-parameter-modulation.lv2
    - mod-cv-random.lv2
    - mod-cv-range.lv2
    - mod-cv-round.lv2
    - mod-cv-slew.lv2
    - mod-cv-switch1.lv2
    - mod-cv-switch2.lv2
    - mod-cv-switch3.lv2
    - mod-cv-switch4.lv2
    - mod-cv-to-audio.lv2
    - mod-cv-transport.lv2
    - mod-midi-to-cv-mono.lv2
    - mod-midi-to-cv-poly.lv2
  modgui:
    brand: MOD
    color: petrol
  dependencies: []
