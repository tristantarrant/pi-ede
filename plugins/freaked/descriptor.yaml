plugin:
  name: freaked
  version: master
  source:
    type: git
    url: https://github.com/pjotrompet/Freaked.git
  build:
    - make BASE_OPTS="-O2 -ffast-math -fdata-sections -ffunction-sections -mcpu=native"
  install:
    - make install PREFIX=${PREFIX_DIR}
  bundles:
    - Freakclip.lv2
    - Freaktail.lv2
    - Granulator.lv2
    - Prefreak.lv2
  dependencies: []
