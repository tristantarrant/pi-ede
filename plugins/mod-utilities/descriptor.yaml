plugin:
  name: mod-utilities
  version: master
  source:
    type: git
    url: https://github.com/moddevices/mod-utilities.git
  build:
    - make
  install:
    - make install DESTDIR=${TARGET_DIR} PREFIX=/usr INSTALL_PATH=/usr/lib/lv2
  bundles:
    - mod-bpf.lv2
    - mod-crossover2.lv2
    - mod-crossover3.lv2
    - mod-gain.lv2
    - mod-gain2x2.lv2
    - mod-hpf.lv2
    - mod-lpf.lv2
    - mod-switchtrigger4.lv2
    - mod-toggleswitch4.lv2
    - switchbox_1-2.lv2
    - switchbox_1-2_st.lv2
    - switchbox_2-1.lv2
    - switchbox_2-1_st.lv2
  modgui:
    brand: MOD
    color: green
  dependencies: []
