plugin:
  name: oneknob-series
  version: main
  source:
    type: git
    url: https://github.com/DISTRHO/OneKnob-Series.git
  build:
    - make MOD_BUILD=true WITH_LTO=true
  install:
    - cp -r bin/*.lv2 ${LV2_DIR}
  bundles:
    - MOD-ConvolutionLoader.lv2
    - OK-AB-InputSelector.lv2
    - OK-AB-OutputSelector.lv2
    - OK-BrickwallLimiter.lv2
    - OK-Compressor.lv2
    - OK-DevilDistortion.lv2
    - OK-Filter.lv2
  modgui:
    brand: DISTRHO
    color: cream
  dependencies: []
