plugin:
  name: regrader
  version: master
  source:
    type: git
    url: https://github.com/linuxmao-org/regrader-port.git
  build:
    - make HAVE_CAIRO=false MOD_BUILD=true NOOPT=true WITH_LTO=true PREFIX=/usr BUILD_VST2=false BUILD_JACK=false

  install:
    - make install INSTALL_DIR=${LV2_DIR} BUILD_VST2=false BUILD_JACK=false
  bundles: []
  dependencies: []
