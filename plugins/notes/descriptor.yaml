plugin:
  name: notes
  version: master
  source:
    type: git
    url: https://git.ventosus.ch/notes.lv2
  build:
    - meson setup build -Dlv2libdir=${LV2_DIR} --prefix=${PREFIX_DIR}
    - meson compile -C build
  install:
    - meson install -C build
  bundles: []
  dependencies:
    - libvterm-dev
    - libxxhash-dev
