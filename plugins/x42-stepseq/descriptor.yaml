plugin:
  name: x42-stespeq
  version: master
  source:
    type: git
    url: https://github.com/x42/stepseq.lv2.git
  build:
    - make clean install MOD=1 N_STEPS=8 N_NOTES=4 LV2DIR=${LV2_DIR}
    - make clean install MOD=1 N_STEPS=8 N_NOTES=8 LV2DIR=${LV2_DIR}
    - make clean install MOD=1 N_STEPS=8 N_NOTES=16 LV2DIR=${LV2_DIR}
    - make clean install MOD=1 N_STEPS=16 N_NOTES=8 LV2DIR=${LV2_DIR}
    - make clean install MOD=1 N_STEPS=32 N_NOTES=8 LV2DIR=${LV2_DIR}
  install:
    - true
  bundles:
    - stepseq_s8n4.lv2
    - stepseq_s8n8.lv2
    - stepseq_s8n16.lv2
    - stepseq_s16n8.lv2
    - stepseq_s32n8.lv2
  dependencies: []
