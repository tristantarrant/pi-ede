plugin:
  name: rezonateur
  version: master
  source:
    type: git
    url: https://github.com/jpcima/rezonateur.git
  build:
    - make HAVE_CAIRO=false HAVE_OPENGL=false MOD_BUILD=true
  install:
    - cp -r bin/*.lv2 ${LV2_DIR}
  bundles:
    - rezonateur.lv2
    - rezonateur-stereo.lv2
  dependencies: []
