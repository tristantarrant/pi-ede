plugin:
  name: infamous-plugins
  version: master
  source:
    type: git
    url: https://github.com/ssj71/infamousPlugins.git
  build:
    - cmake -S . -B bin -DMOD=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=${PREFIX_DIR}
    - cmake --build bin
  install:
    - cmake --install bin
  bundles: []
  dependencies:
    - libzita-resampler-dev
