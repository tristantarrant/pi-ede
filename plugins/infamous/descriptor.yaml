plugin:
  name: infamous-plugins
  version: master
  source:
    type: git
    url: https://github.com/ssj71/infamousPlugins.git
  build:
    - cmake -S . -B bin -DMOD=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX=${PREFIX_DIR}
    - cmake --build bin
  install:
    - cmake --install bin
  bundles:
    - bentdelay.lv2
    - casynth.lv2
    - cheapdist.lv2
    - envfollower.lv2
    - ewham.lv2
    - hip2b.lv2
    - lushlife.lv2
    - mindi.lv2
    - octolo.lv2
    - powercut.lv2
    - powerup.lv2
    - stuck.lv2
  dependencies:
    - libzita-resampler-dev
