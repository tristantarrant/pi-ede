plugin:
  name: neural-amp-modeler-lv2
  version: main
  source:
    type: git
    url: https://github.com/mikeoliphant/neural-amp-modeler-lv2.git
  build:
    - cmake -S . -B bin -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${PREFIX_DIR}
    - cmake --build bin
  install:
    - cmake --install bin
  bundles:
    - neural_amp_modeler.lv2
  dependencies: []
