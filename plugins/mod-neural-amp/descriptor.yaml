plugin:
  name: mod-neural-amp
  version: main
  source:
    type: git
    url: https://github.com/moddevices/mod-neural-amp.git
  build:
    - cmake -S . -B . -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${PREFIX_DIR}
    - cmake --build .
  install:
    - cmake --install .
  bundles:
    - mod-neural-amp.lv2
  dependencies: []
