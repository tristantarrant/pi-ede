plugin:
  name: mod-tap-lv2
  version: master
  source:
    type: git
    url: https://github.com/mod-audio/tap-lv2.git
  build:
    - make
  install:
    - make install INSTALL_PATH=${LV2_DIR}
  bundles:
    - tap-autopan.lv2
    - tap-chorusflanger.lv2
    - tap-deesser.lv2
    - tap-doubler.lv2
    - tap-dynamics.lv2
    - tap-dynamics-st.lv2
    - tap-echo.lv2
    - tap-eq.lv2
    - tap-eqbw.lv2
    - tap-limiter.lv2
    - tap-pinknoise.lv2
    - tap-pitch.lv2
    - tap-reflector.lv2
    - tap-reverb.lv2
    - tap-rotspeak.lv2
    - tap-sigmoid.lv2
    - tap-tremolo.lv2
    - tap-tubewarmth.lv2
    - tap-vibrato.lv2
  dependencies: []
