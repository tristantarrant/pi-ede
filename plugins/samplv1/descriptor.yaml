plugin:
  name: samplv1
  version: master
  source:
    type: git
    url: https://github.com/moddevices/samplv1.git
  build:
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCONFIG_JACK=OFF -DCONFIG_LV2_UI_X11=OFF -DCONFIG_LV2_UI_EXTERNAL=OFF -DCMAKE_INSTALL_PREFIX=${PREFIX_DIR}
    - cmake --build build
  install:
    - cmake --install build
  bundles:
    - samplv1.lv2
  dependencies: []
