plugin:
  name: master_me
  version: 1.3.1
  source:
    type: git
    url: https://github.com/trummerschlunk/master_me.git
  build:
    - make HAVE_DGL=false HAVE_OPENGL=false
  install:
    - make install PREFIX=/usr DESTDIR=${TARGET_DIR}
  bundles:
    - master_me.lv2
    - master_me-easy-presets.lv2
  modgui:
    brand: master_me
    color: wood1
  dependencies: []
