plugin:
  name: fabla
  version: master
  source:
    type: git
    url: https://github.com/openAVproductions/openAV-Fabla2.git
  build:
    - cmake -S . -B bin -DBUILD_GUI=OFF -DBUILD_SSE=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    - cmake --build bin
  install:
    - cmake --install bin --prefix=${PREFIX_DIR}
  bundles: []
  dependencies: []
