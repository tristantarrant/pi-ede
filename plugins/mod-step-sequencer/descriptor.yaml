plugin:
  name: mod-step-sequencer
  version: main
  source:
    type: git
    url: https://github.com/moddevices/mod-step-sequencer-lv2.git
  build:
    - make HAVE_CAIRO=false HAVE_GL=false
  install:
    - cp -rv bin/mod-step-sequencer.lv2 ${LV2_DIR}/
  bundles:
    - mod-step-sequencer.lv2
  modgui:
    brand: MOD
    color: green
  dependencies: []
