plugin:
  name: dexed
  version: master
  source:
    type: git
    url: https://github.com/dcoredump/dexed.lv2.git
  build:
    - git clone --depth 1 --branch 1.2.0 https://github.com/lvtk/lvtk.git /tmp/lvtk-1 2>/dev/null || true
    - mkdir -p ${PREFIX_DIR}/include/lvtk-1/lvtk
    - cp -r /tmp/lvtk-1/lvtk/* ${PREFIX_DIR}/include/lvtk-1/lvtk/
    - mkdir -p ${PREFIX_DIR}/lib
    - g++ ${CXXFLAGS} -fPIC -shared -o ${PREFIX_DIR}/lib/liblvtk_plugin-1.so -I${PREFIX_DIR}/include $(pkg-config --cflags lv2) /tmp/lvtk-1/src/plugin.cpp 2>/dev/null || true
    - mkdir -p ${PREFIX_DIR}/lib/pkgconfig
    - "echo -e \"prefix=${PREFIX_DIR}\\nlibdir=${PREFIX_DIR}/lib\\nincludedir=${PREFIX_DIR}/include\\n\\nName: lvtk-plugin-2\\nVersion: 1.2.0\\nDescription: LV2 Toolkit\\nRequires: lv2\\nLibs: -L\\${libdir} -llvtk_plugin-1\\nCflags: -I\\${includedir}/lvtk-1\" > ${PREFIX_DIR}/lib/pkgconfig/lvtk-plugin-2.pc"
    - cd src
    - PKG_CONFIG_PATH=${PREFIX_DIR}/lib/pkgconfig make
  install:
    - cp -r src/dexed.lv2 ${LV2_DIR}
  bundles:
    - dexed.lv2
  dependencies: []
