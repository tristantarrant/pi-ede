plugin:
  name: die
  version: main
  source:
    type: git
    url: https://github.com/DISTRHO/DIE-Plugins.git
  build:
    - make
  install:
    - make install PREFIX=${PREFIX_DIR}
  bundles:
    - distrho-a-comp.lv2
    - distrho-a-delay.lv2
    - distrho-a-eq.lv2
    - distrho-a-exp.lv2
    - distrho-a-fluidsynth.lv2
    - distrho-a-reverb.lv2
  dependencies: []
