plugin:
  name: guitarix
  version: master
  source:
    type: git
    url: https://github.com/brummer10/guitarix.git
  data:
    type: local
  build:
    - cd trunk
    - ./waf configure --optimization --mod-lv2 --no-lv2-gui --no-standalone --prefix=/usr
    - ./waf
  install:
    - cd trunk
    - ./waf install --destdir=${TARGET_DIR}
  bundles: []
  dependencies:
    - libzita-convolver-dev
    - libzita-resampler-dev
    - libsigc++-2.0-dev
    - gperf
