    - gxtilttone.lv2
    - gx_tremolo.lv2
    - gxts9.lv2
    - gxtubedelay.lv2
    - gxtubetremelo.lv2
    - gxtubevibrato.lv2
    - gxtuner.lv2
    - gx_vfm.lv2
    - gx_voxbass.lv2
    - gx_vstb.lv2
    - gx_w20.lv2
    - gx_zita_rev1.lv2
