plugin:
  name: guitarix
  version: master
  source:
    type: git
    url: https://github.com/brummer10/guitarix.git
  data:
    type: local
  build:
    - cd trunk
    - ./waf configure --optimization --mod-lv2 --no-lv2-gui --no-standalone --prefix=/usr
    - ./waf
  install:
    - cd trunk
    - ./waf install --destdir=${TARGET_DIR}
  bundles:
    - gx_aclipper.lv2
    - gx_alembic.lv2
    - gx_ampegsvt.lv2
    - gx_amp.lv2
    - gx_amp_stereo.lv2
    - gxautowah.lv2
    - gx_barkgraphiceq.lv2
    - gx_bmp.lv2
    - gxbooster.lv2
    - gx_bossds1.lv2
    - gx_cabinet.lv2
    - gx_chorus.lv2
    - gx_colwah.lv2
    - gx_compressor.lv2
    - gx_cstb.lv2
    - gx_delay.lv2
    - gx_detune.lv2
    - gx_digital_delay.lv2
    - gx_digital_delay_st.lv2
    - gx_duck_delay.lv2
    - gx_duck_delay_st.lv2
    - gxechocat.lv2
    - gx_echo.lv2
    - gx_expander.lv2
    - gx_flanger.lv2
    - gx_fumaster.lv2
    - gx_fuzzfacefm.lv2
    - gx_fuzzface.lv2
    - gx_fuzz.lv2
    - gx_gcb_95.lv2
    - gx_graphiceq.lv2
    - gx_hfb.lv2
    - gx_hogsfoot.lv2
    - gx_hornet.lv2
    - gx_jcm800pre.lv2
    - gx_jcm800pre_st.lv2
    - gx_livelooper.lv2
    - gx_mbcompressor.lv2
    - gx_mbdelay.lv2
    - gx_mbdistortion.lv2
    - gx_mbecho.lv2
    - gx_mbreverb.lv2
    - gxmetal_amp.lv2
    - gxmetal_head.lv2
    - gx_mole.lv2
    - gx_muff.lv2
    - gx_mxrdist.lv2
    - gx_oc_2.lv2
    - gx_phaser.lv2
    - gx_rangem.lv2
    - gx_redeye.lv2
    - gx_reverb.lv2
    - gx_room_simulator.lv2
    - gx_saturate.lv2
    - gx_scream.lv2
    - gx_sfp.lv2
    - gx_shimmizita.lv2
    - gx_studiopre.lv2
