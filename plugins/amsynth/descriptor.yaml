plugin:
  name: amsynth
  version: main
  source:
    type: git
    url: https://github.com/amsynth/amsynth.git
  build:
    - ./autogen.sh
    - ./configure --with-gui=no --with-oss=no --with-jack=no --with-alsa=no --with-lash=no --with-nsm=no --with-lv2=yes --with-vst=no --with-pandoc=no --prefix=${PREFIX_DIR}
    - make
  install:
    - make install
