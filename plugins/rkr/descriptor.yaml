plugin:
  name: rkrlv2
  version: master
  source:
    type: git
    url: https://github.com/ssj71/rkrlv2.git
  build:
    - cmake -S . -B bin -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
    - cmake --build bin
  data:
    type: rkr.lv2
  install:
    - make -C bin install DESTDIR=${TARGET_DIR}
